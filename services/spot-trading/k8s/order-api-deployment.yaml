apiVersion: apps/v1
kind: Deployment
metadata:
  name: spot-order-api
  namespace: spot-trading
  labels:
    app: spot-order-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spot-order-api
  template:
    metadata:
      labels:
        app: spot-order-api
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: m6i.large
      terminationGracePeriodSeconds: 30
      containers:
        - name: spot-order-api
          image: ${ECR_REGISTRY}/spot-order-api:${TAG}
          ports:
            - name: http
              containerPort: 8000
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
          envFrom:
            - secretRef:
                name: spot-trading-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: spot-order-api
  namespace: spot-trading
spec:
  selector:
    app: spot-order-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
