apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spot-matching-engine
  namespace: spot-trading
  labels:
    app: spot-matching-engine
spec:
  serviceName: spot-matching-engine
  replicas: 1   # Single pod: shared in-memory order book. Scale via symbol sharding (R-06).
  selector:
    matchLabels:
      app: spot-matching-engine
  template:
    metadata:
      labels:
        app: spot-matching-engine
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: c6i.xlarge
      terminationGracePeriodSeconds: 60
      containers:
        - name: spot-matching-engine
          image: ${ECR_REGISTRY}/spot-order-api:${TAG}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "1"]
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - secretRef:
                name: spot-trading-secrets
          resources:
            requests:
              cpu: "2000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: spot-matching-engine
  namespace: spot-trading
spec:
  clusterIP: None   # headless service for StatefulSet
  selector:
    app: spot-matching-engine
  ports:
    - port: 8001
      targetPort: 8001
